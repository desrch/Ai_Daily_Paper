name: Bug 报告
description: 报告一个可以稳定复现的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简要说明问题及其影响。
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 观察……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期表现
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际表现
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 包括设备、操作系统、浏览器、分支或提交版本等。
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 截图或日志
      description: 请移除日志中的密钥、Token 和个人敏感信息。
  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      options:
        - P0 - 阻断演示或核心流程
        - P1 - 主要功能受影响
        - P2 - 一般问题或体验缺陷
    validations:
      required: true
